# Local PostgreSQL instance for SEMA development.
#
# Usage:
#   1. Copy .env.example to .env and adjust values if you like (defaults
#      work fine for local development).
#   2. Run: docker compose up -d
#   3. PostgreSQL will be available on localhost:5432 with the
#      credentials/database name from .env.
#
# Data is persisted in the "sema_pgdata" Docker volume, so stopping/starting
# the container does NOT lose data. To start completely fresh, run:
#   docker compose down -v

services:
  postgres:
    image: postgres:16
    container_name: sema-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sema_db}
      POSTGRES_USER: ${POSTGRES_USER:-sema_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sema_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sema_pgdata:/var/lib/postgresql/data

volumes:
  sema_pgdata:
